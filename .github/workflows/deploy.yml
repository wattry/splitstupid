name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify build env is present
        run: |
          echo "VITE_POSTHOG_KEY set:    ${{ (secrets.VITE_POSTHOG_KEY || vars.VITE_POSTHOG_KEY) != '' }}"
          echo "VITE_POSTHOG_DOMAIN set: ${{ (secrets.VITE_POSTHOG_DOMAIN || vars.VITE_POSTHOG_DOMAIN) != '' }}"
      - run: pnpm build
        env:
          # Read from either the Secrets or the Variables tab, whichever holds it.
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY || vars.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_DOMAIN: ${{ vars.VITE_POSTHOG_DOMAIN || secrets.VITE_POSTHOG_DOMAIN }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
